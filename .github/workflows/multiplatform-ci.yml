name: Multiplatform CI

# Run on push to master and on PRs - just Linux, macOS, Android, iOS
on:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  CARGO_NDK_VERSION: "3.1.2"
  NDK_VERSION: "r28c"

jobs:
  # ============================================
  # Linux Build (full test)
  # ============================================
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rustdesk-ci-linux

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --workspace --no-fail-fast

  # ============================================
  # macOS Build (just library)
  # ============================================
  build-macos:
    name: macOS (x86_64 & ARM64)
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: arm64
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rustdesk-ci-macos-${{ matrix.arch }}

      - name: Build librustdesk
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@master
        with:
          name: librustdesk-macos-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/liblibrustdesk.a

  # ============================================
  # Android Build (just library)
  # ============================================
  build-android:
    name: Android (ARM64, ARMv7, x86_64)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-linux-android
            android_target: arm64-v8a
          - arch: armv7
            target: armv7-linux-androideabi
            android_target: armeabi-v7a
          - arch: x86_64
            target: x86_64-linux-android
            android_target: x86_64
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rustdesk-ci-android-${{ matrix.arch }}

      - name: Build librustdesk
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
          cargo ndk ${{ matrix.target }} build --release

      - name: Upload artifact
        uses: actions/upload-artifact@master
        with:
          name: librustdesk-android-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/liblibrustdesk.so

  # ============================================
  # iOS Build (just library)
  # ============================================
  build-ios:
    name: iOS (ARM64)
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rustdesk-ci-ios

      - name: Build librustdesk
        run: |
          rustup target add aarch64-apple-ios
          cargo build --release --target aarch64-apple-ios

      - name: Upload artifact
        uses: actions/upload-artifact@master
        with:
          name: liblibrustdesk-ios
          path: target/aarch64-apple-ios/release/liblibrustdesk.a

  # ============================================
  # Windows Build (manual trigger only)
  # ============================================
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-2022
    # Manual trigger only - Windows build is complex due to vcpkg dependencies
    workflow_dispatch:
      inputs:
        features:
          description: 'Build features'
          required: false
          default: ''
          type: string
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: 120deac3062162151622ca4860575a33844ba10b
          vcpkgBootstrapCommand: |
            .\bootstrap-vcpkg.bat

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        shell: bash
        run: |
          export VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
          "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.75
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rustdesk-ci-windows

      - name: Build
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          RUSTFLAGS: "-C target-feature=+crt-static"
        shell: bash
        run: |
          export VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@master
        with:
          name: rustdesk-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
